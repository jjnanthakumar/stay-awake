name: Test Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyautogui
    
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev
    
    - name: Run basic tests
      run: |
        python test_basic.py
    
    - name: Test imports
      run: |
        python -c "from config import Config; print('Config OK')"
        python -c "from modes import create_mode; print('Modes OK')"
        python -c "from core import StayAwake; print('Core OK')"
    
    - name: Validate configuration
      run: |
        python -c "from config import Config; c = Config(); errors = c.validate(); print(f'Validation: {len(errors)} errors'); exit(0 if len(errors) == 0 else 1)"
