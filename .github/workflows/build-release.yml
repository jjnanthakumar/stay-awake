name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake --icon=NONE gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli --icon=NONE cli.py
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-windows
        path: |
          dist/NJStayAwake.exe
          dist/njstayawake-cli.exe
          README.md
          LICENSE
          QUICK_START.md
    
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli cli.py
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-linux
        path: |
          dist/NJStayAwake
          dist/njstayawake-cli
          README.md
          LICENSE
          QUICK_START.md
  
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli cli.py
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-macos
        path: |
          dist/NJStayAwake
          dist/njstayawake-cli
          README.md
          LICENSE
          QUICK_START.md

  semantic-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      tag: ${{ steps.bump.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        persist-credentials: false
    
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: njstayawake-windows
        path: windows-build
    
    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: njstayawake-linux
        path: linux-build
    
    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: njstayawake-macos
        path: macos-build
    
    - name: Determine version bump
      id: bump
      uses: anothrNick/github-tag-action@1.75.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        RELEASE_BRANCHES: main
        DRY_RUN: true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: steps.bump.outputs.new_tag != steps.bump.outputs.tag
      with:
        tag_name: ${{ steps.bump.outputs.new_tag }}
        name: NJStayAwake ${{ steps.bump.outputs.new_tag }}
        files: |
          windows-build/NJStayAwake.exe
          windows-build/njstayawake-cli.exe
          linux-build/NJStayAwake
          linux-build/njstayawake-cli
          macos-build/NJStayAwake
          macos-build/njstayawake-cli
          README.md
          LICENSE
          QUICK_START.md
        body: |
          ## NJStayAwake ${{ steps.bump.outputs.new_tag }}
          
          ### 📥 Quick Download (No Installation Required!)
          
          **Windows Users:**
          - 🖱️ GUI: Download [`NJStayAwake.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake.exe) - Just double-click to run!
          - 💻 CLI: Download [`njstayawake-cli.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli.exe)
          
          **Linux Users:**
          - 🖱️ GUI: Download [`NJStayAwake`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake) - Run: `chmod +x NJStayAwake && ./NJStayAwake`
          - 💻 CLI: Download [`njstayawake-cli`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli)
          
          **macOS Users:**
          - 🖱️ GUI: Download [`NJStayAwake`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake) - Right-click → Open (first time)
          - 💻 CLI: Download [`njstayawake-cli`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli)
          
          ### ✨ Features
          - 🎨 User-friendly GUI with real-time monitoring
          - 💻 Powerful CLI for automation
          - 🎯 Multiple activity modes (Minimal, Mouse, Keyboard, Full)
          - 🔄 Three mouse patterns (Linear, Circle, Random)
          - 💾 Configuration save/load
          - 📊 Real-time statistics
          
          ### 📖 Documentation
          - [Quick Start Guide](https://github.com/${{ github.repository }}/blob/main/QUICK_START.md) - For non-technical users
          - [Full Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
          
          ---
          
          **Version bumped automatically based on commit messages.**
          
          Use conventional commits for automatic versioning:
          - `feat:` = minor version bump (new features)
          - `fix:` = patch version bump (bug fixes)
          - `BREAKING CHANGE:` = major version bump
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Bump version tag
      uses: anothrNick/github-tag-action@1.75.0
      if: steps.bump.outputs.new_tag != steps.bump.outputs.tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        RELEASE_BRANCHES: main,master

  publish-pypi:
    needs: semantic-release
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new_tag != needs.semantic-release.outputs.tag
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Update version in pyproject.toml
      run: |
        VERSION="${{ needs.semantic-release.outputs.new_tag }}"
        VERSION="${VERSION#v}"  # Remove 'v' prefix
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
        cat pyproject.toml | grep version
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check distribution
      run: twine check dist/*
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    
    - name: Publish to Test PyPI (optional backup)
      if: failure()
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: twine upload --repository testpypi dist/* --skip-existing
