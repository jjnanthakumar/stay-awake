name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui pillow
    
    - name: Convert logo to ICO
      run: |
        python -c "from PIL import Image; img = Image.open('logo.png'); img.save('logo.ico', format='ICO', sizes=[(32,32), (48,48), (64,64)])"
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake --icon=logo.ico --add-data="logo.png;." gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli --icon=logo.ico cli.py
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-windows
        path: |
          dist/NJStayAwake.exe
          dist/njstayawake-cli.exe
          README.md
          LICENSE
          QUICK_START.md
    
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake --icon=logo.png --add-data="logo.png:." gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli --icon=logo.png cli.py
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-linux
        path: |
          dist/NJStayAwake
          dist/njstayawake-cli
          README.md
          LICENSE
          QUICK_START.md
  
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyautogui
    
    - name: Build GUI executable
      run: |
        pyinstaller --onefile --windowed --name=NJStayAwake --icon=logo.png --add-data="logo.png:." gui.py
    
    - name: Build CLI executable
      run: |
        pyinstaller --onefile --console --name=njstayawake-cli --icon=logo.png cli.py
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: njstayawake-macos
        path: |
          dist/NJStayAwake
          dist/njstayawake-cli
          README.md
          LICENSE
          QUICK_START.md

  semantic-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      tag: ${{ steps.bump.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        persist-credentials: false
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: List artifacts (debug)
      run: |
        echo "Listing artifacts structure:"
        ls -R artifacts/
    
    - name: Organize files for release
      run: |
        mkdir -p release
        cp artifacts/njstayawake-windows/dist/NJStayAwake.exe release/NJStayAwake.exe || true
        cp artifacts/njstayawake-windows/dist/njstayawake-cli.exe release/njstayawake-cli-windows.exe || true
        cp artifacts/njstayawake-linux/dist/NJStayAwake release/NJStayAwake-linux || true
        cp artifacts/njstayawake-linux/dist/njstayawake-cli release/njstayawake-cli-linux || true
        cp artifacts/njstayawake-macos/dist/NJStayAwake release/NJStayAwake-macos || true
        cp artifacts/njstayawake-macos/dist/njstayawake-cli release/njstayawake-cli-macos || true
        cp artifacts/njstayawake-windows/README.md release/README.md || true
        cp artifacts/njstayawake-windows/LICENSE release/LICENSE || true
        cp artifacts/njstayawake-windows/QUICK_START.md release/QUICK_START.md || true
        echo "Files organized:"
        ls -la release/
    
    - name: Determine version bump
      id: bump
      uses: anothrNick/github-tag-action@1.75.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        RELEASE_BRANCHES: main
        DRY_RUN: true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.bump.outputs.new_tag }}
        name: NJStayAwake ${{ steps.bump.outputs.new_tag }}
        files: |
          release/NJStayAwake.exe
          release/njstayawake-cli-windows.exe
          release/NJStayAwake-linux
          release/njstayawake-cli-linux
          release/NJStayAwake-macos
          release/njstayawake-cli-macos
          release/README.md
          release/LICENSE
          release/QUICK_START.md
        body: |
          ## NJStayAwake ${{ steps.bump.outputs.new_tag }}
          
          ### 📥 Quick Download (No Installation Required!)
          
          **Windows Users:**
          - 🖱️ GUI: Download [`NJStayAwake.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake.exe) - Just double-click to run!
          - 💻 CLI: Download [`njstayawake-cli-windows.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli-windows.exe)
          
          **Linux Users:**
          - 🖱️ GUI: Download [`NJStayAwake-linux`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake-linux) - Run: `chmod +x NJStayAwake-linux && ./NJStayAwake-linux`
          - 💻 CLI: Download [`njstayawake-cli-linux`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli-linux)
          
          **macOS Users:**
          - 🖱️ GUI: Download [`NJStayAwake-macos`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/NJStayAwake-macos) - Right-click → Open (first time)
          - 💻 CLI: Download [`njstayawake-cli-macos`](https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag }}/njstayawake-cli-macos)
          
          ### ✨ Features
          - 🎨 User-friendly GUI with real-time monitoring
          - 💻 Powerful CLI for automation
          - 🎯 Multiple activity modes (Minimal, Mouse, Keyboard, Full)
          - 🔄 Three mouse patterns (Linear, Circle, Random)
          - 💾 Configuration save/load
          - 📊 Real-time statistics
          
          ### 📖 Documentation
          - [Quick Start Guide](https://github.com/${{ github.repository }}/blob/main/QUICK_START.md) - For non-technical users
          - [Full Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
          
          ---
          
          **Version bumped automatically based on commit messages.**
          
          Use conventional commits for automatic versioning:
          - `feat:` = minor version bump (new features)
          - `fix:` = patch version bump (bug fixes)
          - `BREAKING CHANGE:` = major version bump
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Bump version tag
      uses: anothrNick/github-tag-action@1.75.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        RELEASE_BRANCHES: main

  publish-pypi:
    needs: semantic-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Update version in pyproject.toml
      run: |
        VERSION="${{ needs.semantic-release.outputs.new_tag }}"
        VERSION="${VERSION#v}"  # Remove 'v' prefix
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
        cat pyproject.toml | grep version
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check distribution
      run: twine check dist/*
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    
    - name: Publish to Test PyPI (optional backup)
      if: failure()
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: twine upload --repository testpypi dist/* --skip-existing
